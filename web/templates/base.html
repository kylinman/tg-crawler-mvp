<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TG Crawler Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f6fa; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .table-hover tbody tr:hover { background-color: #f8f9ff; }
        .badge-confidence-high { background: #28a745; }
        .badge-confidence-mid { background: #ffc107; color: #000; }
        .badge-confidence-low { background: #dc3545; }
        .media-thumb { object-fit: cover; height: 200px; width: 100%; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .media-thumb:hover { transform: scale(1.02); }
        .sticky-review { position: sticky; top: 20px; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">📡 TG Crawler Admin</a>
            <div class="d-flex align-items-center gap-3">
                {% if user %}
                <a href="/" class="btn btn-sm {% if request.url.path == '/' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">消息</a>
                <a href="/persons" class="btn btn-sm {% if request.url.path == '/persons' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">人物检索</a>
                {% if user.role == 'admin' %}
                <a href="/ops" class="btn btn-sm {% if request.url.path == '/ops' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">系统控制</a>
                <a href="/users" class="btn btn-sm {% if request.url.path == '/users' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">用户管理</a>
                {% endif %}
                <a href="/crawl-logs" class="btn btn-sm {% if request.url.path == '/crawl-logs' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">采集日志</a>
                <a href="/audit" class="btn btn-sm {% if request.url.path == '/audit' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">审计日志</a>
                <a href="/settings" class="btn btn-sm {% if request.url.path == '/settings' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">采集配置</a>
                <a href="/account" class="btn btn-sm {% if request.url.path == '/account' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">我的账户</a>
                <span class="text-light small">{{ user.username }} ({{ user.role }})</span>
                <a href="/logout" class="btn btn-sm btn-outline-light">退出</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
